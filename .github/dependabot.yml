# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "terraform" # See documentation for possible values
    directory: "terraform/implementation/ecs" # Location of package manifests
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"

  - package-ecosystem: "terraform" # See documentation for possible values
    directory: "terraform/implementation/setup" # Location of package manifests
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"

  - package-ecosystem: "terraform" # See documentation for possible values
    directory: "terraform/modules/db" # Location of package manifests
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"

  - package-ecosystem: "terraform" # See documentation for possible values
    directory: "terraform/modules/oidc" # Location of package manifests
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"

  - package-ecosystem: "terraform" # See documentation for possible values
    directory: "terraform/modules/tfstate" # Location of package manifests
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
